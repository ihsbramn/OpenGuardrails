# ==========================================
# Kustomize overlay for K8s deployment
# ==========================================
# Usage:
#   kubectl apply -k k8s/
#   Or set image tags:
#   kustomize edit set image openguardrails-server=ghcr.io/org/openguardrails-server:v1.0.0
#   kustomize edit set image openguardrails-client=ghcr.io/org/openguardrails-client:v1.0.0
# ==========================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openguardrails

resources:
  - deployment.yaml

images:
  - name: openguardrails-server
    newTag: latest
  - name: openguardrails-client
    newTag: latest

# Override Ingress host for your environment
# patches:
#   - patch: |-
#       - op: replace
#         path: /spec/rules/0/host
#         value: openguardrails.your-domain.com
#     target:
#       kind: Ingress
#       name: og-ingress

# Uncomment for TLS
# secretGenerator:
#   - name: og-tls-secret
#     type: kubernetes.io/tls
#     files:
#       - tls.crt
#       - tls.key
